      - name: Run Laravel deployment commands
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}

          script: |
            set -e

            echo "======================================"
            echo "Iniciando deploy de Laravel"
            echo "======================================"

            # ==========================================
            # Configurar directorio de Composer
            # ==========================================

            export PATH="$HOME/bin:$PATH"

            mkdir -p "$HOME/bin"

            # ==========================================
            # Instalar Composer si no existe
            # ==========================================

            if ! command -v composer >/dev/null 2>&1; then

              echo "Composer no encontrado."

              echo "Instalando Composer..."

              cd "$HOME"

              php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"

              php composer-setup.php \
                --install-dir="$HOME/bin" \
                --filename=composer

              rm -f composer-setup.php

              echo "Composer instalado correctamente."

            else

              echo "Composer ya está instalado."

            fi

            # ==========================================
            # Verificar Composer
            # ==========================================

            echo ""
            echo "Versión de Composer:"

            composer --version

            # ==========================================
            # Ir al proyecto
            # ==========================================

            cd "${{ secrets.CPANEL_PROJECT_PATH }}"

            echo ""
            echo "Directorio actual:"

            pwd

            # ==========================================
            # Instalar dependencias Laravel
            # ==========================================

            echo ""
            echo "Instalando dependencias de Composer..."

            composer install \
              --no-dev \
              --optimize-autoloader \
              --no-interaction \
              --prefer-dist

            # ==========================================
            # Ejecutar migraciones
            # ==========================================

            echo ""
            echo "Ejecutando migraciones..."

            php artisan migrate --force

            # ==========================================
            # Limpiar cachés
            # ==========================================

            echo ""
            echo "Limpiando cachés..."

            php artisan optimize:clear

            # ==========================================
            # Generar cachés
            # ==========================================

            echo ""
            echo "Generando caché de configuración..."

            php artisan config:cache

            echo ""
            echo "Generando caché de rutas..."

            php artisan route:cache

            echo ""
            echo "Generando caché de vistas..."

            php artisan view:cache

            echo ""
            echo "======================================"
            echo "Deploy completado correctamente"
            echo "======================================"